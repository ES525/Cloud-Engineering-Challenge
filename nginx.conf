server {
    listen 443 ssl;
    server_name localhost;

    # These paths must match the volume in docker-compose
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # Where the website files live
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # API Key Bonus logic
    location /api {
        default_type application/json;
        if ($http_x_api_key != "nucleus-intern-2026") {
            return 401 '{"error": "Unauthorized"}';
        }
        return 200 '{"status": "Authenticated", "message": "Access Granted"}';
    }
}